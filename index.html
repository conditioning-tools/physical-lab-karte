<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHYSICAL LAB GINZA｜コンディションカルテ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;background:#eef2f7;padding:16px;color:#333;}
.app{max-width:740px;margin:0 auto;}
h1{font-size:13px;color:#006494;font-weight:700;margin-bottom:10px;}
.tab-bar{display:flex;border-bottom:2px solid #006494;}
.tab{padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:#cde4f0;color:#006494;border-radius:6px 6px 0 0;margin-right:4px;font-family:Arial,sans-serif;}
.tab.active{background:#006494;color:#fff;}
.panel{display:none;}
.panel.active{display:block;}
.form-wrap{padding:16px;background:#fff;border-radius:0 0 8px 8px;border:1px solid #ccc;}
.sec{margin-bottom:14px;}
.sec-title{font-size:11px;font-weight:700;color:#fff;background:#006494;padding:5px 10px;border-radius:4px;margin-bottom:8px;display:block;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.field{display:flex;flex-direction:column;gap:3px;}
.field label{font-size:10px;color:#555;font-weight:600;}
.field input,.field select,.field textarea{font-size:13px;padding:6px 8px;border:1px solid #b5d4f4;border-radius:6px;background:#fff;color:#333;width:100%;font-family:Arial,sans-serif;}
.btn-wrap{display:flex;gap:8px;margin-top:14px;}
.btn-gen{background:#006494;color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;flex:1;font-family:Arial,sans-serif;}
.btn-gen:hover{background:#004f76;}
.btn-clear{background:#fff;color:#888;border:1px solid #ccc;padding:10px 16px;border-radius:20px;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;}
.action-bar{display:flex;gap:8px;margin:12px 0;}
.print-btn{background:#006494;color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;}
.save-btn{background:#2e7d52;color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;}
.back-btn{background:#fff;color:#006494;border:1px solid #006494;padding:10px 16px;border-radius:20px;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;}

/* カルテ */
.karte{background:#fff;border:1px solid #ccc;border-radius:8px;overflow:hidden;}
.kh{background:#006494;padding:16px 20px;}
.kh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.kh-clinic{font-size:9px;color:rgba(255,255,255,0.7);letter-spacing:1px;}
.kh-title{font-size:15px;font-weight:700;color:#fff;margin-top:2px;}
.kh-month{font-size:17px;font-weight:700;color:#fff;text-align:right;}
.kh-sub{font-size:9px;color:rgba(255,255,255,0.7);text-align:right;}
.member-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.15);border-radius:6px;padding:8px 12px;}
.avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.member-name{font-size:13px;font-weight:700;color:#fff;}
.member-badge{margin-left:auto;background:rgba(255,255,255,0.2);border-radius:20px;padding:3px 10px;font-size:9px;color:rgba(255,255,255,0.9);}

/* サマリーバー */
.summary-bar{background:#006494;padding:12px 20px;display:flex;align-items:stretch;gap:10px;}
.score-circle{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,0.4);}
.score-num{font-size:20px;font-weight:700;color:#fff;line-height:1;}
.score-lbl{font-size:8px;color:rgba(255,255,255,0.7);margin-top:2px;}
.divider-v{width:1px;background:rgba(255,255,255,0.25);margin:0 2px;}
.sum-col{display:flex;flex-direction:column;gap:4px;flex:1;}
.sum-col-title{font-size:9px;color:rgba(255,255,255,0.6);font-weight:700;letter-spacing:0.5px;margin-bottom:2px;}
.risk-row{display:flex;align-items:center;gap:6px;}
.risk-name{font-size:9px;color:rgba(255,255,255,0.85);width:90px;flex-shrink:0;}
.rbadge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;white-space:nowrap;}
.rok{background:#4caf50;color:#fff;}
.rwarn{background:#ff9800;color:#fff;}
.rng{background:#f44336;color:#fff;}
.rna{background:rgba(255,255,255,0.2);color:rgba(255,255,255,0.65);}
.motion-pct{font-size:18px;font-weight:700;color:#fff;line-height:1;}
.motion-lbl{font-size:9px;color:rgba(255,255,255,0.7);}
.motion-bar-bg{background:rgba(255,255,255,0.15);border-radius:20px;height:6px;width:100%;margin:3px 0;}
.motion-bar-fill{height:6px;border-radius:20px;background:#7dd3b8;}
.motion-comment{font-size:9px;color:rgba(255,255,255,0.8);line-height:1.4;}
.pbadge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;white-space:nowrap;}
.pabove{background:#7dd3b8;color:#003d2a;}
.psame{background:rgba(255,255,255,0.25);color:#fff;}
.pbelow{background:#ff9800;color:#fff;}
.pna{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);}

/* 本体 */
.kb{padding:14px 20px;}
.slabel{font-size:9px;font-weight:700;color:#888;letter-spacing:0.8px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.slabel::after{content:'';flex:1;height:1px;background:#e0e0e0;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.cat-card{background:#f5f7fa;border-radius:6px;padding:10px 12px;border:1px solid #e8edf2;}
.cat-name{font-size:9px;color:#006494;font-weight:700;margin-bottom:6px;letter-spacing:0.5px;}
.item-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.item-name{font-size:10px;color:#444;flex:1;}
.stars{font-size:13px;color:#C8961A;flex-shrink:0;white-space:nowrap;}
.star-off{color:#aaaaaa;}
.tend{font-size:9px;color:#888;margin-top:2px;margin-bottom:4px;line-height:1.4;}
.ib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;}
.ib{background:#f5f7fa;border-radius:6px;padding:8px 10px;border:1px solid #e8edf2;}
.ib-label{font-size:9px;color:#888;margin-bottom:3px;}
.ib-val{font-size:13px;font-weight:700;color:#333;}
.comment-box{background:#e6f1fb;border-left:4px solid #006494;padding:10px 12px;margin-bottom:12px;}
.comment-by{font-size:9px;color:#006494;font-weight:700;margin-bottom:4px;}
.comment-text{font-size:11px;color:#042c53;line-height:1.7;}
.kf{padding:10px 20px;border-top:1px solid #eee;background:#f9fbfd;}
.kf-note{font-size:9px;color:#aaa;}

@media print{
  body{background:#fff;padding:0;}
  .tab-bar,.action-bar,.btn-wrap,.form-wrap{display:none!important;}
  .panel{display:block!important;}
  .app{max-width:100%;}
  .karte{border:none;border-radius:0;}
  .kh,.summary-bar,.cat-card,.ib{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .rbadge,.pbadge{white-space:nowrap;font-size:8px;padding:2px 5px;}
  .risk-name{font-size:8px;width:80px;}
  .sum-col-title{font-size:8px;}
  .score-num{font-size:18px;}
}
</style>
</head>
<body>
<div class="app">
<h1>PHYSICAL LAB GINZA｜コンディションカルテ生成ツール</h1>
<div class="tab-bar">
  <button class="tab active" id="tab-input" onclick="showTab('input')">入力</button>
  <button class="tab" id="tab-karte" onclick="showTab('karte')">カルテプレビュー</button>
</div>

<div id="input" class="panel active">
<div class="form-wrap">

  <div class="sec">
    <span class="sec-title">会員情報</span>
    <div class="grid3">
      <div class="field"><label>会員名</label><input id="i-name" autocomplete="off" placeholder="田中 さゆり"></div>
      <div class="field"><label>測定年月</label><input id="i-month" autocomplete="off" placeholder="2026年5月"></div>
      <div class="field"><label>担当トレーナー</label><input id="i-trainer" autocomplete="off" placeholder="川越"></div>
    </div>
    <div class="grid2" style="margin-top:8px;">
      <div class="field"><label>年齢（計算用のみ・カルテ非表示）</label><input id="i-age" type="number" autocomplete="off" placeholder="48"></div>
      <div class="field"><label>性別（計算用のみ・カルテ非表示）</label>
        <select id="i-gender"><option value="female">女性</option><option value="male">男性</option></select>
      </div>
    </div>
  </div>

  <div class="sec">
    <span class="sec-title">ムーブメント</span>
    <div class="grid2">
      <div class="field"><label>2ステップ値（2歩の距離÷身長）例：1.42</label><input id="i-step2" type="number" step="0.01" autocomplete="off" placeholder="1.42"></div>
      <div class="field"><label>CS-5 椅子立ち上がり（秒）例：10.2</label><input id="i-cs5" type="number" step="0.1" autocomplete="off" placeholder="10.2"></div>
    </div>
  </div>

  <div class="sec">
    <span class="sec-title">可動性</span>
    <div class="grid2">
      <div class="field"><label>FFD 立位体前屈（床との距離cm・届かない場合+、超えた場合-）</label><input id="i-ffd" type="number" autocomplete="off" placeholder="8"></div>
      <div class="field"><label>肩関節可動域テスト（手の長さ基準：1〜3点）</label><input id="i-shoulder" type="number" min="1" max="3" autocomplete="off" placeholder="2"></div>
      <div class="field"><label>胸椎回旋・右（手と床の距離cm）</label><input id="i-thorax-r" type="number" autocomplete="off" placeholder="3"></div>
      <div class="field"><label>胸椎回旋・左（手と床の距離cm）</label><input id="i-thorax-l" type="number" autocomplete="off" placeholder="4"></div>
    </div>
  </div>

  <div class="sec">
    <span class="sec-title">安定性</span>
    <div class="grid2">
      <div class="field"><label>片足立ち・開眼（秒）</label><input id="i-bal-open" type="number" autocomplete="off" placeholder="45"></div>
      <div class="field"><label>片足立ち・閉眼（秒）</label><input id="i-bal-close" type="number" autocomplete="off" placeholder="8"></div>
      <div class="field"><label>バードドッグ・右（回）</label><input id="i-bird-r" type="number" autocomplete="off" placeholder="7"></div>
      <div class="field"><label>バードドッグ・左（回）</label><input id="i-bird-l" type="number" autocomplete="off" placeholder="6"></div>
    </div>
  </div>

  <div class="sec">
    <span class="sec-title">筋力・筋量</span>
    <div class="grid3">
      <div class="field"><label>握力・右（kg）</label><input id="i-grip-r" type="number" step="0.1" autocomplete="off" placeholder="28.4"></div>
      <div class="field"><label>握力・左（kg）</label><input id="i-grip-l" type="number" step="0.1" autocomplete="off" placeholder="26.1"></div>
      <div class="field"><label>InBody 筋肉量（kg）</label><input id="i-muscle" type="number" step="0.1" autocomplete="off" placeholder="38.8"></div>
    </div>
  </div>

  <div class="sec">
    <span class="sec-title">トレーナーコメント</span>
    <div class="field"><textarea id="i-comment" rows="3" placeholder="今月の変化・次回の重点テーマなど"></textarea></div>
  </div>

  <div class="btn-wrap">
    <button class="btn-clear" onclick="clearAll()">クリア</button>
    <button class="btn-gen" onclick="generateKarte()">カルテを生成する →</button>
  </div>
</div>
</div>

<div id="karte" class="panel">
  <div class="action-bar">
    <button class="back-btn" onclick="showTab('input')">← 入力に戻る</button>
    <button class="save-btn" id="save-btn" onclick="saveToSheet()">スプレッドシートに保存</button>
    <button class="print-btn" onclick="window.print()">PDF保存・印刷</button>
  </div>
  <div id="karte-output"></div>
</div>
</div>

<script>
// GAS URL設定
const GAS_URL = 'ここにGASのURLを貼り付ける';

// タブ切替
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// 値取得
function gv(id) {
  var el = document.getElementById(id);
  return el ? el.value.trim() : '';
}
function gn(id) {
  var x = parseFloat(gv(id));
  return isNaN(x) ? null : x;
}

// スター計算
function calcStar(val, thresholds, higherIsBetter) {
  if (val === null) return null;
  if (higherIsBetter) {
    if (val >= thresholds[1]) return 3;
    if (val >= thresholds[0]) return 2;
    return 1;
  } else {
    if (val <= thresholds[0]) return 3;
    if (val <= thresholds[1]) return 2;
    return 1;
  }
}

function calcAllStars() {
  var isFemale = gv('i-gender') === 'female';
  return {
    step2:   calcStar(gn('i-step2'),   [1.3, 1.4], true),
    cs5:     calcStar(gn('i-cs5'),     [8, 12],    false),
    ffd:     calcStar(gn('i-ffd'),     [0, 10],    false),
    shoulder:calcStar(gn('i-shoulder'),[2, 3],     true),
    thoraxR: calcStar(gn('i-thorax-r'),[0, 5],     false),
    thoraxL: calcStar(gn('i-thorax-l'),[0, 5],     false),
    balance: (function(){
      var o = gn('i-bal-open'), c = gn('i-bal-close');
      if (o === null && c === null) return null;
      if (c !== null && c >= 20) return 3;
      if (o !== null && o >= 20) return 2;
      return 1;
    })(),
    birdR:   calcStar(gn('i-bird-r'),  [5, 10],    true),
    birdL:   calcStar(gn('i-bird-l'),  [5, 10],    true),
    gripR:   (function(){
      var x = gn('i-grip-r');
      if (x === null) return null;
      return x >= (isFemale ? 24 : 36) ? 3 : x >= (isFemale ? 18 : 28) ? 2 : 1;
    })(),
    gripL:   (function(){
      var x = gn('i-grip-l');
      if (x === null) return null;
      return x >= (isFemale ? 24 : 36) ? 3 : x >= (isFemale ? 18 : 28) ? 2 : 1;
    })()
  };
}

// 健康スコア（全★★★で100%）
function calcHealthScore(s) {
  var all = [s.step2, s.cs5, s.ffd, s.shoulder, s.thoraxR, s.thoraxL, s.balance, s.birdR, s.birdL, s.gripR, s.gripL];
  var judged = all.filter(function(x){ return x !== null; });
  if (judged.length === 0) return null;
  var total = judged.reduce(function(a,b){ return a+b; }, 0);
  return Math.round((total / (judged.length * 3)) * 100);
}

// 動きの基礎（可動性＋安定性の★★★達成率）
function calcMotion(s) {
  var motion = [s.ffd, s.shoulder, s.thoraxR, s.thoraxL, s.balance, s.birdR, s.birdL];
  var judged = motion.filter(function(x){ return x !== null; });
  if (judged.length === 0) return { pct: null, pct3: null, comment: '' };
  // ★合計÷最大値（種目数×3）×100（全部★★★で100%）
  var total = judged.reduce(function(a,b){ return a+b; }, 0);
  var pct = Math.round((total / (judged.length * 3)) * 100);
  // ★★★達成率
  var pct3 = Math.round((judged.filter(function(x){ return x === 3; }).length / judged.length) * 100);
  var comment = pct >= 80 ? '動きの土台がしっかりしています' : pct >= 50 ? '一部に改善の余地があります' : '動きの基礎を重点的に整えましょう';
  return { pct: pct, pct3: pct3, comment: comment };
}

// リスク判定
function calcRisk(s) {
  var step2 = gn('i-step2'), cs5 = gn('i-cs5');
  var gripR = gn('i-grip-r'), balOpen = gn('i-bal-open');
  var isFemale = gv('i-gender') === 'female';

  // ロコモ
  var locomo = 'na';
  if (step2 !== null || cs5 !== null) {
    var s2ok = step2 !== null ? step2 >= 1.3 : true;
    var c5ok = cs5  !== null ? cs5  <  12   : true;
    locomo = (s2ok && c5ok) ? 'ok' : 'ng';
  }

  // サルコペニア
  var sarco = 'na';
  if (gripR !== null || cs5 !== null) {
    var gok = gripR !== null ? gripR >= (isFemale ? 18 : 28) : true;
    var cok = cs5   !== null ? cs5   < 12 : true;
    sarco = (gok && cok) ? 'ok' : 'warn';
  }

  // 転倒
  var fall = balOpen !== null ? (balOpen >= 20 ? 'ok' : 'ng') : 'na';

  return { locomo: locomo, sarco: sarco, fall: fall };
}

// 同年代比
function calcPeer(s) {
  var age = gn('i-age');
  var isFemale = gv('i-gender') === 'female';
  var step2 = gn('i-step2'), cs5 = gn('i-cs5'), gripR = gn('i-grip-r');

  function gripAvg(age, f) {
    if (age === null) return null;
    return f ? (age < 50 ? 23 : age < 60 ? 22 : 21) : (age < 50 ? 38 : age < 60 ? 36 : 34);
  }
  function stepAvg(age) {
    if (age === null) return null;
    return age < 50 ? 1.49 : age < 60 ? 1.45 : 1.38;
  }
  function cs5Avg(age) {
    if (age === null) return null;
    return age < 50 ? 9.5 : age < 60 ? 10.5 : 12.0;
  }
  function judge(val, avg, higher) {
    if (val === null || avg === null) return 'na';
    var r = higher ? val / avg : avg / val;
    return r >= 1.1 ? 'above' : r >= 0.9 ? 'same' : 'below';
  }

  return {
    grip:  judge(gripR, gripAvg(age, isFemale), true),
    step2: judge(step2, stepAvg(age), true),
    cs5:   judge(cs5,   cs5Avg(age),  false)
  };
}

// HTML生成ヘルパー
function starHtml(n) {
  if (n === null) return '<span style="color:#ccc">—</span>';
  var h = '';
  for (var i = 1; i <= 3; i++) h += i <= n ? '★' : '<span class="star-off">★</span>';
  return h;
}
function rBadge(s, okTxt, warnTxt, ngTxt) {
  if (s === 'ok')   return '<span class="rbadge rok">✓ ' + okTxt + '</span>';
  if (s === 'warn') return '<span class="rbadge rwarn">△ ' + warnTxt + '</span>';
  if (s === 'ng')   return '<span class="rbadge rng">✕ ' + ngTxt + '</span>';
  return '<span class="rbadge rna">データなし</span>';
}
function pBadge(s) {
  if (s === 'above') return '<span class="pbadge pabove">同年代以上</span>';
  if (s === 'same')  return '<span class="pbadge psame">同年代並み</span>';
  if (s === 'below') return '<span class="pbadge pbelow">同年代以下</span>';
  return '<span class="pbadge pna">—</span>';
}
function initials(name) {
  if (!name) return '?';
  var p = name.trim().split(/\s+/);
  return p.length >= 2 ? p[0].slice(-1) + p[1].slice(0,1) : name.slice(0,2);
}

// カルテ生成
function generateKarte() {
  var s = calcAllStars();
  var score = calcHealthScore(s);
  var motion = calcMotion(s);
  var risk = calcRisk(s);
  var peer = calcPeer(s);

  var name    = gv('i-name')    || '—';
  var month   = gv('i-month')   || '—';
  var trainer = gv('i-trainer') || '—';
  var comment = gv('i-comment');
  var muscle  = gv('i-muscle');
  var gripR   = gv('i-grip-r');
  var gripL   = gv('i-grip-l');
  var step2   = gv('i-step2');
  var ffd     = gv('i-ffd');
  var cs5     = gv('i-cs5');

  var motionBar = motion.pct !== null
    ? '<div class="motion-bar-bg"><div class="motion-bar-fill" style="width:' + motion.pct + '%"></div></div>'
    : '';

  var commentHtml = comment
    ? '<div class="slabel">トレーナーコメント</div><div class="comment-box"><div class="comment-by">' + trainer + '</div><div class="comment-text">' + comment + '</div></div>'
    : '';

  var ffdTend = s.ffd === 1 ? '<div class="tend">硬い場合：腰痛・膝への負担が増えやすい傾向</div>' : '';
  var shoulderTend = s.shoulder === 1 ? '<div class="tend">硬い場合：四十肩・頸部への負担が増えやすい傾向</div>' : '';
  var thoraxTend = (s.thoraxR === 1 || s.thoraxL === 1) ? '<div class="tend">硬い場合：腰・肩・頸部への負担が増えやすい傾向</div>' : '';

  var html = '<div class="karte">'
    + '<div class="kh">'
    + '<div class="kh-top">'
    + '<div><div class="kh-clinic">PHYSICAL LAB GINZA</div><div class="kh-title">コンディションカルテ</div></div>'
    + '<div><div class="kh-sub">測定日</div><div class="kh-month">' + month + '</div></div>'
    + '</div>'
    + '<div class="member-bar">'
    + '<div class="avatar">' + initials(name) + '</div>'
    + '<div class="member-name">' + name + ' さん</div>'
    + '<div class="member-badge">担当：' + trainer + '</div>'
    + '</div>'
    + '</div>'

    // サマリーバー
    + '<div class="summary-bar">'
    + '<div class="score-circle"><div class="score-num">' + (score !== null ? score + '%' : '—') + '</div><div class="score-lbl">健康スコア</div></div>'
    + '<div class="divider-v"></div>'
    + '<div class="sum-col">'
    + '<div class="sum-col-title">健康リスク判定</div>'
    + '<div class="risk-row"><div class="risk-name">ロコモリスク</div>' + rBadge(risk.locomo, 'リスクなし', '要注意', 'リスクあり') + '</div>'
    + '<div class="risk-row"><div class="risk-name">サルコペニア</div>' + rBadge(risk.sarco, 'リスクなし', '要注意', 'リスクあり') + '</div>'
    + '<div class="risk-row"><div class="risk-name">転倒リスク</div>' + rBadge(risk.fall, 'リスクなし', '要注意', 'リスクあり') + '</div>'
    + '</div>'
    + '<div class="divider-v"></div>'
    + '<div class="sum-col">'
    + '<div class="sum-col-title">動きの基礎</div>'
    + '<div class="motion-pct">' + (motion.pct !== null ? motion.pct + '%' : '—') + '</div>'
    + '<div class="motion-lbl">測定済み種目の達成率</div>'
    + motionBar
    + '<div class="motion-comment">' + motion.comment + '</div>'
    + (motion.pct3 !== undefined && motion.pct3 !== null ? '<div class="motion-comment" style="margin-top:2px;">★★★達成率：' + motion.pct3 + '%</div>' : '')
    + '</div>'
    + '<div class="divider-v"></div>'
    + '<div class="sum-col">'
    + '<div class="sum-col-title">同年代比</div>'
    + '<div class="risk-row"><div class="risk-name">握力</div>' + pBadge(peer.grip) + '</div>'
    + '<div class="risk-row"><div class="risk-name">2ステップ値</div>' + pBadge(peer.step2) + '</div>'
    + '<div class="risk-row"><div class="risk-name">CS-5</div>' + pBadge(peer.cs5) + '</div>'
    + '</div>'
    + '</div>'
    + '<div style="background:#004f76;padding:4px 20px;font-size:8px;color:rgba(255,255,255,0.55);text-align:right;">※ 各判定はスクリーニング指標であり、医学的診断を断定するものではありません</div>'

    // 評価結果
    + '<div class="kb">'
    + '<div class="slabel">評価結果</div>'
    + '<div class="cat-grid">'

    + '<div class="cat-card"><div class="cat-name">ムーブメント</div>'
    + '<div class="item-row"><div class="item-name">2ステップ値' + (step2 ? ' (' + step2 + ')' : '') + '</div><div class="stars">' + starHtml(s.step2) + '</div></div>'
    + '<div style="font-size:8px;color:#aaa;margin-bottom:3px;">目標：1.4以上　要注意：1.3未満（ロコモ度）</div>'
    + '<div class="item-row"><div class="item-name">CS-5' + (cs5 ? ' (' + cs5 + '秒)' : '') + '</div><div class="stars">' + starHtml(s.cs5) + '</div></div>'
    + '<div style="font-size:8px;color:#aaa;margin-bottom:3px;">目標：8秒未満　要注意：12秒以上（AWGS2019）</div>'
    + '</div>'

    + '<div class="cat-card"><div class="cat-name">可動性</div>'
    + '<div class="item-row"><div class="item-name">立位体前屈' + (ffd ? ' (床まで' + ffd + 'cm)' : '') + '</div><div class="stars">' + starHtml(s.ffd) + '</div></div>'
    + '<div style="font-size:8px;color:#aaa;margin-bottom:3px;">目標：床に触れる(0cm以下)　要注意：10cm以上</div>'
    + ffdTend
    + '<div class="item-row"><div class="item-name">肩関節可動域テスト</div><div class="stars">' + starHtml(s.shoulder) + '</div></div>'
    + '<div style="font-size:8px;color:#aaa;margin-bottom:3px;">目標：1手幅以内(3点)　要注意：1.5手幅超(1点)</div>'
    + shoulderTend
    + '<div class="item-row"><div class="item-name">胸椎回旋（右/左）</div><div class="stars">' + starHtml(s.thoraxR) + ' / ' + starHtml(s.thoraxL) + '</div></div>'
    + '<div style="font-size:8px;color:#aaa;margin-bottom:3px;">目標：床につく(0cm)　要注意：5cm超</div>'
    + thoraxTend
    + '</div>'

    + '<div class="cat-card"><div class="cat-name">安定性</div>'
    + '<div class="item-row"><div class="item-name">片足立ち</div><div class="stars">' + starHtml(s.balance) + '</div></div>'
    + '<div style="font-size:8px;color:#aaa;margin-bottom:3px;">目標：閉眼20秒以上　要注意：開眼20秒未満（転倒リスク）</div>'
    + '<div class="item-row"><div class="item-name">バードドッグ（右/左）</div><div class="stars">' + starHtml(s.birdR) + ' / ' + starHtml(s.birdL) + '</div></div>'
    + '<div style="font-size:8px;color:#aaa;margin-bottom:3px;">目標：10回以上・左右差2回以内　要注意：5回未満</div>'
    + '</div>'

    + '<div class="cat-card"><div class="cat-name">筋力・筋量</div>'
    + '<div class="item-row"><div class="item-name">握力（右/左）</div><div class="stars">' + starHtml(s.gripR) + ' / ' + starHtml(s.gripL) + '</div></div>'
    + '<div style="font-size:8px;color:#aaa;margin-bottom:3px;">要注意：男性28kg未満・女性18kg未満（サルコペニア基準）</div>'
    + '<div class="item-row"><div class="item-name">InBody 筋肉量</div><div class="stars" style="color:#333;font-size:11px;">' + (muscle ? muscle + 'kg' : '—') + '</div></div>'
    + '<div style="font-size:8px;color:#aaa;margin-bottom:3px;">要注意：男性7.0・女性5.7 kg/m²未満（サルコペニア基準）</div>'
    + '</div>'
    + '</div>'

    // InBody
    + '<div class="slabel">測定値</div>'
    + '<div class="ib-grid">'
    + '<div class="ib"><div class="ib-label">筋肉量</div><div class="ib-val">' + (muscle || '—') + ' kg</div></div>'
    + '<div class="ib"><div class="ib-label">握力（右/左）</div><div class="ib-val">' + (gripR || '—') + ' / ' + (gripL || '—') + ' kg</div></div>'
    + '<div class="ib"><div class="ib-label">2ステップ値</div><div class="ib-val">' + (step2 || '—') + '</div></div>'
    + '<div class="ib"><div class="ib-label">立位体前屈</div><div class="ib-val">' + (ffd !== '' ? ffd + ' cm' : '—') + '</div></div>'
    + '</div>'

    + commentHtml
    + '</div>'
    + '<div class="kf"><div class="kf-note">次回測定：翌月　／　詳細評価はフィジカルドックで</div></div>'
    + '</div>';

  document.getElementById('karte-output').innerHTML = html;
  showTab('karte');
}

// クリア
function clearAll() {
  document.querySelectorAll('#input input, #input textarea').forEach(function(el){ el.value = ''; });
  document.getElementById('i-gender').value = 'female';
}

// スプレッドシートに保存
function saveToSheet() {
  if (GAS_URL === 'ここにGASのURLを貼り付ける') {
    alert('GASのURLが設定されていません。セットアップ手順書を確認してください。');
    return;
  }
  if (!gv('i-name') || !gv('i-month')) {
    alert('会員名と測定年月は必須です。');
    return;
  }
  var btn = document.getElementById('save-btn');
  btn.textContent = '保存中...';
  btn.disabled = true;
  var data = {
    name: gv('i-name'), month: gv('i-month'), trainer: gv('i-trainer'),
    age: gv('i-age'), gender: gv('i-gender'),
    step2: gv('i-step2'), cs5: gv('i-cs5'),
    ffd: gv('i-ffd'), shoulder: gv('i-shoulder'),
    thoraxR: gv('i-thorax-r'), thoraxL: gv('i-thorax-l'),
    balOpen: gv('i-bal-open'), balClose: gv('i-bal-close'),
    birdR: gv('i-bird-r'), birdL: gv('i-bird-l'),
    gripR: gv('i-grip-r'), gripL: gv('i-grip-l'),
    muscle: gv('i-muscle'), comment: gv('i-comment')
  };
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  }).then(function() {
    btn.textContent = '✓ 保存しました！';
    btn.style.background = '#4caf50';
    setTimeout(function() {
      btn.textContent = 'スプレッドシートに保存';
      btn.style.background = '#2e7d52';
      btn.disabled = false;
    }, 3000);
  }).catch(function() {
    alert('保存に失敗しました。URLを確認してください。');
    btn.textContent = 'スプレッドシートに保存';
    btn.disabled = false;
  });
}
</script>
